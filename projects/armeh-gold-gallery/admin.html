<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>پنل مدیریت | گالری طلای آرمه</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    a { text-decoration: none; color: inherit; }
    ul, ol { list-style: none; }
    button { font-family: inherit; }

    :root {
      --green:       #114411;
      --green-deep:  #0c330c;
      --green-mid:   #1a5c1a;
      --green-pale:  #e8f0e8;
      --green-tint:  #f2f6f2;
      --gold:        #c9a840;
      --gold-dark:   #9a7e28;
      --white:       #ffffff;
      --off-white:   #faf9f6;
      --cream:       #f4f0e6;
      --text:        #1a1a1a;
      --text-dim:    #6b6b6b;
      --text-muted:  #9a9a9a;
      --border:      #e0ddd5;
      --error:       #c0392b;
      --ease:        cubic-bezier(.25,.46,.45,.94);
    }
    html { scroll-behavior: smooth; }
    body { background: var(--off-white); color: var(--text); font-family: 'Vazirmatn', system-ui, sans-serif; line-height: 1.7; min-height: 100vh; }
    .container { width: 100%; max-width: 1100px; margin: 0 auto; padding: 0 40px; }

    /* NAV */
    .nav {
      position: sticky; top: 0; z-index: 900; padding: 0 48px; height: 76px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(224, 221, 213, 0.45);
      transition: background .3s var(--ease), box-shadow .3s var(--ease), border-color .3s var(--ease);
    }
    .nav.scrolled {
      background: rgba(255, 255, 255, 0.82);
      border-bottom-color: var(--border);
      box-shadow: 0 2px 20px rgba(0,0,0,.06);
    }
    .nav-logo { display: flex; align-items: center; gap: 12px; }
    .nav-logo-img { height: 44px; width: auto; }
    .nav-links { display: flex; align-items: center; gap: 40px; }
    .nav-links a { font-size: 13px; font-weight: 500; color: var(--text-dim); transition: color .2s; }
    .nav-links a:hover { color: var(--green); }

    /* PAGE */
    .page-hero { background: var(--green); padding: 48px 0 40px; text-align: center; }
    .page-hero h1 { font-size: clamp(1.5rem, 3vw, 2.2rem); font-weight: 300; color: var(--white); }
    .page-hero h1 strong { font-weight: 700; color: var(--gold); }
    .page-hero p { font-size: 13px; color: rgba(255,255,255,.5); margin-top: 6px; }

    .page-body { padding: 48px 0 80px; }

    /* TABS */
    .tab-nav { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 32px; }
    .tab-btn {
      padding: 12px 24px; font-size: 13px; font-weight: 600; color: var(--text-muted);
      background: none; border: none; cursor: pointer; border-bottom: 2px solid transparent;
      margin-bottom: -2px; transition: color .2s, border-color .2s;
    }
    .tab-btn.active { color: var(--green); border-color: var(--green); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* SECTION HEADER */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .section-header h2 { font-size: 15px; font-weight: 700; color: var(--green-deep); }
    .section-header-products {
      display: grid;
      grid-template-columns: auto minmax(200px, 1fr) auto;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }
    .section-header-products h2 { font-size: 15px; font-weight: 700; color: var(--green-deep); white-space: nowrap; }
    .admin-search-wrap { position: relative; width: 100%; max-width: 420px; justify-self: center; }
    .admin-search-input {
      width: 100%; padding: 9px 40px 9px 14px;
      border: 1px solid var(--border); border-radius: 2px;
      font-family: 'Vazirmatn', sans-serif; font-size: 13px;
      background: var(--white); color: var(--text); outline: none;
      transition: border-color .2s;
    }
    .admin-search-input:focus { border-color: var(--green); }
    .admin-search-input::placeholder { color: var(--text-muted); }
    .admin-search-icon {
      position: absolute; top: 50%; right: 12px; transform: translateY(-50%);
      color: var(--text-muted); pointer-events: none; line-height: 0;
    }
    .admin-search-icon svg { width: 16px; height: 16px; display: block; }

    /* TABLE */
    .data-table { width: 100%; border-collapse: collapse; background: var(--white); border: 1px solid var(--border); border-radius: 3px; overflow: hidden; font-size: 13px; }
    .data-table th { background: var(--green-tint); padding: 12px 16px; text-align: right; font-size: 11px; font-weight: 700; letter-spacing: .06em; color: var(--green-deep); border-bottom: 1px solid var(--border); }
    .data-table td { padding: 12px 16px; border-bottom: 1px solid var(--border); color: var(--text-dim); vertical-align: middle; }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: var(--off-white); }

    /* AVAILABILITY TOGGLE */
    .toggle-wrap { display: flex; align-items: center; gap: 8px; }
    .toggle { position: relative; width: 40px; height: 22px; }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-slider {
      position: absolute; inset: 0; background: #ccc; border-radius: 22px;
      cursor: pointer; transition: background .25s;
    }
    .toggle-slider::before {
      content: ''; position: absolute; width: 16px; height: 16px;
      right: 3px; top: 3px; background: white; border-radius: 50%;
      transition: transform .25s;
    }
    .toggle input:checked + .toggle-slider { background: var(--green); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(-18px); }
    .avail-label { font-size: 12px; font-weight: 600; }
    .avail-label.yes { color: var(--green); }
    .avail-label.no  { color: var(--text-muted); }

    /* USER ACTIONS */
    .action-btns { display: flex; gap: 8px; }
    .btn-action {
      padding: 5px 12px; border-radius: 2px; font-size: 11px; font-weight: 600;
      cursor: pointer; border: 1px solid; transition: background .2s;
    }
    .btn-edit   { color: var(--green); border-color: rgba(17,68,17,.3); background: none; }
    .btn-edit:hover   { background: var(--green-pale); }
    .btn-orders { color: var(--gold-dark); border-color: rgba(154,126,40,.3); background: none; }
    .btn-orders:hover { background: var(--cream); }
    .btn-delete { color: var(--error); border-color: rgba(192,57,43,.3); background: none; }
    .btn-delete:hover { background: rgba(192,57,43,.06); }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--white); border-radius: 4px; width: 100%; max-width: 480px;
      max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.2);
    }
    .modal.modal-wide { max-width: 560px; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px 16px; border-bottom: 1px solid var(--border); }
    .modal-header h3 { font-size: 15px; font-weight: 700; color: var(--green-deep); }
    .modal-close { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 20px; line-height: 1; padding: 0; }
    .modal-body { padding: 24px; }
    .modal-footer { padding: 0 24px 24px; display: flex; justify-content: flex-end; gap: 10px; }

    /* FORM */
    .form-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 5px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 2px; font-family: 'Vazirmatn', sans-serif; font-size: 13px; color: var(--text); background: var(--white); outline: none; transition: border-color .2s; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--green); }

    .btn-add-product { padding: 8px 18px; background: var(--green); color: var(--white); border: none; border-radius: 2px; font-family: 'Vazirmatn', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; }
    .btn-add-product:hover { background: var(--green-mid); }
    .product-thumb { width: 44px; height: 44px; object-fit: cover; border-radius: 2px; border: 1px solid var(--border); background: var(--cream); }
    .product-thumb-empty { width: 44px; height: 44px; border-radius: 2px; border: 1px dashed var(--border); background: var(--cream); display: flex; align-items: center; justify-content: center; font-size: 9px; color: var(--text-muted); }
    .image-upload-box { border: 1px dashed var(--border); border-radius: 3px; padding: 16px; text-align: center; background: var(--off-white); }
    .prod-images-gallery { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 12px; min-height: 0; }
    .prod-img-item { position: relative; width: 72px; height: 72px; border-radius: 3px; overflow: hidden; border: 1px solid var(--border); background: var(--cream); }
    .prod-img-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .prod-img-remove {
      position: absolute; top: 2px; left: 2px; width: 20px; height: 20px;
      background: rgba(192,57,43,.9); color: #fff; border: none; border-radius: 2px;
      font-size: 14px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .prod-img-remove:hover { background: #c0392b; }
    .image-actions { display: flex; gap: 8px; justify-content: center; margin-top: 10px; flex-wrap: wrap; }
    .btn-img { padding: 6px 14px; font-size: 11px; font-weight: 600; border-radius: 2px; cursor: pointer; font-family: 'Vazirmatn', sans-serif; border: 1px solid var(--border); background: var(--white); color: var(--text-dim); }
    .btn-img:hover { background: var(--off-white); }
    .btn-img.danger { color: var(--error); border-color: rgba(192,57,43,.3); }
    .btn-img.danger:hover { background: rgba(192,57,43,.06); }
    #product-image-input { display: none; }

    .btn-primary { padding: 10px 24px; background: var(--green); color: var(--white); border: none; border-radius: 2px; font-family: 'Vazirmatn', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: background .2s; }
    .btn-primary:hover { background: var(--green-mid); }
    .btn-secondary { padding: 10px 24px; background: none; border: 1px solid var(--border); border-radius: 2px; font-family: 'Vazirmatn', sans-serif; font-size: 13px; font-weight: 600; color: var(--text-dim); cursor: pointer; transition: background .2s; }
    .btn-secondary:hover { background: var(--off-white); }

    /* ORDERS LIST */
    .order-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
    .order-item:last-child { border-bottom: none; }
    .order-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
    .order-status { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; background: var(--cream); color: var(--gold-dark); }
    .order-products { font-size: 13px; color: var(--text-dim); }
    .no-orders { font-size: 13px; color: var(--text-muted); text-align: center; padding: 20px 0; }

    /* COLLECTION LABEL */
    .coll-badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; background: var(--cream); color: var(--gold-dark); border-radius: 10px; }

    @media (max-width: 768px) {
      .container { padding: 0 20px; }
      .nav { padding: 0 20px; }
      .form-row2 { grid-template-columns: 1fr; }
      .page-hero { padding: 40px 0 32px; }
      .page-hero p { font-size: 13px; }
      .page-body { padding: 32px 0 48px; }
      .data-table { min-width: 640px; }
      .action-btns { flex-wrap: wrap; }
      .section-header-products {
        grid-template-columns: 1fr auto;
        grid-template-rows: auto auto;
        gap: 12px;
      }
      .section-header-products h2 { grid-column: 1; }
      .section-header-products .btn-add-product { grid-column: 2; grid-row: 1; }
      .section-header-products .admin-search-wrap {
        grid-column: 1 / -1;
        grid-row: 2;
        max-width: none;
        justify-self: stretch;
      }
    }
    @media (max-width: 480px) {
      .container { padding: 0 16px; }
      .nav { padding: 0 16px; }
      .modal-body { padding: 16px; }
      .modal-footer { flex-direction: column-reverse; }
      .modal-footer .btn-primary, .modal-footer .btn-secondary { width: 100%; }
    }
  </style>
</head>

    <ul class="nav-links" id="nav-links">
      <li><a href="index.html#collections">مجموعه‌ها</a></li>

      <li id="nav-login-li"><a href="login.html">ورود</a></li>

      </a>
      <a href="cart.html" class="nav-cart" aria-label="سبد خرید">

        <span class="cart-badge" style="display:none"></span>
      </a>
    </div>
  </nav>

  <section class="page-hero">
    <div class="container">
      <h1><strong>پنل</strong> مدیریت</h1>
      <p>مدیریت محصولات و کاربران گالری طلای آرمه</p>
    </div>
  </section>

  <main class="page-body">
    <div class="container" id="admin-body">
      <!-- rendered by JS -->
    </div>
  </main>

  <!-- Edit User Modal -->
  <div class="modal-overlay hidden" id="edit-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>ویرایش کاربر</h3>
        <button class="modal-close" onclick="closeModal('edit-modal')">×</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="edit-uid" />
        <div class="form-row2">
          <div class="form-group"><label>نام</label><input id="edit-fn" type="text" /></div>
          <div class="form-group"><label>نام خانوادگی</label><input id="edit-ln" type="text" /></div>
        </div>
        <div class="form-group"><label>ایمیل</label><input id="edit-email" type="email" /></div>
        <div class="form-group"><label>شماره موبایل</label><input id="edit-phone" type="tel" /></div>
        <div class="form-row2">
          <div class="form-group"><label>استان</label><input id="edit-ostan" type="text" /></div>
          <div class="form-group"><label>شهر</label><input id="edit-shahr" type="text" /></div>
        </div>
        <div class="form-group"><label>آدرس</label><input id="edit-address" type="text" /></div>
        <div class="form-group"><label>کد پستی</label><input id="edit-postal" type="text" /></div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeModal('edit-modal')">انصراف</button>
        <button class="btn-primary" onclick="saveEdit()">ذخیره</button>
      </div>
    </div>
  </div>

  <!-- Product Modal -->
  <div class="modal-overlay hidden" id="product-modal">
    <div class="modal modal-wide">
      <div class="modal-header">
        <h3 id="product-modal-title">افزودن محصول</h3>
        <button class="modal-close" onclick="closeModal('product-modal')">×</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="prod-id" />
        <div class="form-group">
          <label>مجموعه</label>
          <select id="prod-collection"></select>
        </div>
        <div class="form-group">
          <label>نام محصول</label>
          <input type="text" id="prod-name" placeholder="مثال: انگشتر نگین‌دار کلاسیک" />
        </div>
        <div class="form-row2">
          <div class="form-group">
            <label>جنس / عیار</label>
            <input type="text" id="prod-material" placeholder="طلای ۱۸ عیار" />
          </div>
          <div class="form-group">
            <label>قیمت (تومان)</label>
            <input type="number" id="prod-price" min="0" step="100000" placeholder="28500000" dir="ltr" style="text-align:right" />
          </div>
        </div>
        <div class="form-group">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="checkbox" id="prod-available" checked style="width:auto" />
            موجود در فروشگاه
          </label>
        </div>
        <div class="form-group">
          <label>توضیحات محصول <span style="font-weight:400;color:var(--text-muted)">(اختیاری)</span></label>
          <textarea id="prod-description" rows="3" placeholder="جزئیات، ابعاد، نگین و..."></textarea>
        </div>
        <div class="form-group">
          <label>تصاویر محصول</label>
          <div class="image-upload-box">
            <div id="prod-images-gallery" class="prod-images-gallery"></div>
            <p id="prod-image-hint" style="font-size:12px;color:var(--text-muted)">فرمت JPG یا PNG — حداکثر ۲ مگابایت برای هر تصویر — تعداد نامحدود</p>
            <input type="file" id="product-image-input" accept="image/jpeg,image/png,image/webp" multiple />
            <div class="image-actions">
              <button type="button" class="btn-img" onclick="document.getElementById('product-image-input').click()">افزودن تصویر</button>
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeModal('product-modal')">انصراف</button>
        <button class="btn-primary" onclick="saveProduct()">ذخیره محصول</button>
      </div>
    </div>
  </div>

  <!-- Orders Modal -->
  <div class="modal-overlay hidden" id="orders-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="orders-modal-title">سابقه سفارش‌ها</h3>
        <button class="modal-close" onclick="closeModal('orders-modal')">×</button>
      </div>
      <div class="modal-body" id="orders-modal-body"></div>
    </div>
  </div>

  <script src="js/armeh.js"></script>
  <script>
  let productSearchQuery = '';
  let adminActiveTab = 'products';
  let pendingProductImages = undefined;

  function renderAdmin() {
    try {
      document.getElementById('admin-body').innerHTML = `
        <div class="tab-nav">
          <button class="tab-btn${adminActiveTab === 'products' ? ' active' : ''}" onclick="switchTab('products', this)">مدیریت محصولات</button>
          <button class="tab-btn${adminActiveTab === 'users' ? ' active' : ''}" onclick="switchTab('users', this)">مدیریت کاربران</button>
        </div>
        <div class="tab-panel${adminActiveTab === 'products' ? ' active' : ''}" id="tab-products">${renderProductsTab()}</div>
        <div class="tab-panel${adminActiveTab === 'users' ? ' active' : ''}" id="tab-users">${renderUsersTab()}</div>`;
      initAdminProductSearch();
      const searchInput = document.getElementById('admin-product-search');
      if (searchInput) searchInput.value = productSearchQuery;
      filterAdminProductTable();
    } catch (err) {
      console.error(err);
      document.getElementById('admin-body').innerHTML = `
        <p style="color:var(--error);padding:32px 0;font-size:14px">خطا در بارگذاری پنل. لطفاً صفحه را رفرش کنید.</p>`;
    }
  }

  function initAdminProductSearch() {
    const body = document.getElementById('admin-body');
    if (!body || body.dataset.searchBound) return;
    body.dataset.searchBound = '1';
    body.addEventListener('input', e => {
      if (e.target.id !== 'admin-product-search') return;
      productSearchQuery = e.target.value;
      filterAdminProductTable();
    });
    body.addEventListener('search', e => {
      if (e.target.id !== 'admin-product-search') return;
      productSearchQuery = e.target.value;
      filterAdminProductTable();
    });
  }

  function filterAdminProductTable() {
    const q = productSearchQuery.trim();
    const rows = document.querySelectorAll('#tab-products .data-table tbody tr[data-pid]');
    let visible = 0;
    rows.forEach(row => {
      if (!q) {
        row.style.display = '';
        visible++;
        return;
      }
      const match = (row.textContent || '').includes(q);
      row.style.display = match ? '' : 'none';
      if (match) visible++;
    });
    const countEl = document.getElementById('admin-product-count');
    if (countEl) {
      const total = rows.length;
      countEl.textContent = q ? `(${visible} از ${total})` : `(${total})`;
    }
    const emptyRow = document.getElementById('admin-search-empty');
    if (emptyRow) emptyRow.style.display = rows.length && visible === 0 ? '' : 'none';
    const placeholderRow = document.getElementById('admin-products-placeholder');
    if (placeholderRow) placeholderRow.style.display = rows.length > 0 ? 'none' : '';
  }

  function refreshProductsTable() {
    const panel = document.getElementById('tab-products');
    const tbody = document.querySelector('#tab-products .data-table tbody');
    if (!panel || !tbody) return;

    const products = Object.values(Products.getAll()).flat();
    const emptyMsg = '<tr id="admin-products-placeholder"><td colspan="7" style="text-align:center;padding:32px;color:var(--text-muted)">محصولی ثبت نشده است.</td></tr>';
    const noResults = '<tr id="admin-search-empty" style="display:none"><td colspan="7" style="text-align:center;padding:32px;color:var(--text-muted)">نتیجه‌ای یافت نشد.</td></tr>';

    if (!products.length) {
      tbody.innerHTML = emptyMsg + noResults;
    } else {
      tbody.innerHTML = products.map(buildProductRowHtml).join('') + noResults;
    }

    const input = document.getElementById('admin-product-search');
    if (input && input.value !== productSearchQuery) input.value = productSearchQuery;
    filterAdminProductTable();
  }

  function switchTab(name, btn) {
    adminActiveTab = name;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
    if (name === 'products') filterAdminProductTable();
  }

  function adminThumbHtml(imgs) {
    if (!imgs.length) return '<div class="product-thumb-empty">بدون<br>تصویر</div>';
    const src = imgs[0];
    if (!src || src.length > 12000) {
      const label = imgs.length > 1 ? `${imgs.length} تصویر` : 'تصویر';
      return `<div class="product-thumb-empty">${label}</div>`;
    }
    const safeSrc = src.replace(/"/g, '&quot;');
    const count = imgs.length > 1
      ? `<span style="font-size:9px;color:var(--text-muted);display:block;margin-top:2px">${imgs.length} تصویر</span>`
      : '';
    return `<img src="${safeSrc}" class="product-thumb" alt="" />${count}`;
  }

  function buildProductRowHtml(p) {
    const imgs = getProductImages(p);
    const thumb = adminThumbHtml(imgs);
    return `
      <tr data-pid="${escHtml(p.id)}">
        <td>${thumb}</td>
        <td><span class="coll-badge">${escHtml(p.collectionName)}</span></td>
        <td style="font-weight:600;color:var(--text)">${escHtml(p.name)}</td>
        <td>${escHtml(p.material)}</td>
        <td style="font-weight:600;color:var(--gold-dark)">${escHtml(formatPrice(p.price))}</td>
        <td>
          <div class="toggle-wrap">
            <label class="toggle">
              <input type="checkbox" ${p.available ? 'checked' : ''} onchange="toggleAvail('${p.id}', this.checked)" />
              <span class="toggle-slider"></span>
            </label>
            <span class="avail-label ${p.available ? 'yes' : 'no'}">${p.available ? 'موجود' : 'ناموجود'}</span>
          </div>
        </td>
        <td>
          <div class="action-btns">
            <button class="btn-action btn-edit" onclick="openProductEdit('${p.id}')">ویرایش</button>
            <button class="btn-action btn-delete" onclick="confirmDeleteProduct('${p.id}')">حذف</button>
          </div>
        </td>
      </tr>`;
  }

  function renderProductsTab() {
    const all = Products.getAll();
    const products = Object.values(all).flat();
    const rows = products.map(buildProductRowHtml).join('');
    const total = products.length;
    const searchSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>';
    const emptyMsg = products.length
      ? ''
      : '<tr id="admin-products-placeholder"><td colspan="7" style="text-align:center;padding:32px;color:var(--text-muted)">محصولی ثبت نشده است.</td></tr>';
    return `
      <div class="section-header-products">
        <h2>مدیریت محصولات <span id="admin-product-count">(${total})</span></h2>
        <div class="admin-search-wrap">
          <input type="search" id="admin-product-search" class="admin-search-input" placeholder="جستجوی محصول، مجموعه یا جنس..." autocomplete="off" aria-label="جستجوی محصولات" />
          <span class="admin-search-icon">${searchSvg}</span>
        </div>
        <button class="btn-add-product" onclick="openProductAdd()">+ افزودن محصول</button>
      </div>
      <div class="data-table-wrap">
        <table class="data-table">
          <thead><tr><th>تصویر</th><th>مجموعه</th><th>نام</th><th>جنس</th><th>قیمت</th><th>وضعیت</th><th>عملیات</th></tr></thead>
          <tbody>
            ${rows}${emptyMsg}
            <tr id="admin-search-empty" style="display:none"><td colspan="7" style="text-align:center;padding:32px;color:var(--text-muted)">نتیجه‌ای یافت نشد.</td></tr>
          </tbody>
        </table>
      </div>`;
  }

  function fillCollectionSelect(selected) {
    const sel = document.getElementById('prod-collection');
    sel.innerHTML = Object.values(Products.COLLECTIONS).map(c =>
      `<option value="${c.key}"${c.key === selected ? ' selected' : ''}>${c.name}</option>`
    ).join('');
  }

  function renderProductImagesGallery() {
    const gallery = document.getElementById('prod-images-gallery');
    const imgs = Array.isArray(pendingProductImages) ? pendingProductImages : [];
    if (!imgs.length) {
      gallery.innerHTML = '<p style="font-size:11px;color:var(--text-muted);width:100%">هنوز تصویری اضافه نشده است.</p>';
      return;
    }
    gallery.innerHTML = imgs.map((src, i) => `
      <div class="prod-img-item">
        <img src="${src}" alt="تصویر ${i + 1}" />
        <button type="button" class="prod-img-remove" onclick="removeProductImageAt(${i})" aria-label="حذف تصویر">×</button>
      </div>`).join('');
  }

  function openProductAdd() {
    pendingProductImages = [];
    document.getElementById('product-modal-title').textContent = 'افزودن محصول جدید';
    document.getElementById('prod-id').value = '';
    fillCollectionSelect('rings');
    document.getElementById('prod-name').value = '';
    document.getElementById('prod-material').value = 'طلای ۱۸ عیار';
    document.getElementById('prod-price').value = '';
    document.getElementById('prod-description').value = '';
    document.getElementById('prod-available').checked = true;
    document.getElementById('product-image-input').value = '';
    renderProductImagesGallery();
    document.getElementById('product-modal').classList.remove('hidden');
  }

  function openProductEdit(id) {
    const found = Products.findProduct(id);
    if (!found) return;
    const p = found.product;
    pendingProductImages = getProductImages(p).slice();
    document.getElementById('product-modal-title').textContent = 'ویرایش محصول';
    document.getElementById('prod-id').value = p.id;
    fillCollectionSelect(found.collection);
    document.getElementById('prod-name').value = p.name;
    document.getElementById('prod-material').value = p.material;
    document.getElementById('prod-price').value = p.price || '';
    document.getElementById('prod-description').value = p.description || '';
    document.getElementById('prod-available').checked = p.available !== false;
    document.getElementById('product-image-input').value = '';
    renderProductImagesGallery();
    document.getElementById('product-modal').classList.remove('hidden');
  }

  function removeProductImageAt(index) {
    if (!Array.isArray(pendingProductImages)) return;
    pendingProductImages.splice(index, 1);
    renderProductImagesGallery();
  }

  document.getElementById('product-image-input').addEventListener('change', async function () {
    const files = Array.from(this.files || []);
    if (!files.length) return;
    if (!Array.isArray(pendingProductImages)) pendingProductImages = [];
    for (const file of files) {
      if (file.size > 2 * 1024 * 1024) {
        alert(`تصویر «${file.name}» بیش از ۲ مگابایت است و رد شد.`);
        continue;
      }
      try {
        pendingProductImages.push(await compressImage(file, 480, 0.72));
      } catch (e) {
        alert(`خطا در بارگذاری «${file.name}».`);
      }
    }
    renderProductImagesGallery();
    this.value = '';
  });

  function saveProduct() {
    const id = document.getElementById('prod-id').value;
    const name = document.getElementById('prod-name').value.trim();
    const collection = document.getElementById('prod-collection').value;
    const material = document.getElementById('prod-material').value.trim();
    const price = document.getElementById('prod-price').value;
    const description = document.getElementById('prod-description').value.trim();
    const available = document.getElementById('prod-available').checked;
    if (!name) { alert('لطفاً نام محصول را وارد کنید.'); return; }
    if (!material) { alert('لطفاً جنس محصول را وارد کنید.'); return; }
    const data = { name, material, price, available, collection, description };
    if (pendingProductImages !== undefined) data.images = pendingProductImages.slice();
    if (id) Products.updateProduct(id, data);
    else Products.addProduct(collection, data);
    closeModal('product-modal');
    refreshProductsTable();
  }

  function confirmDeleteProduct(id) {
    const found = Products.findProduct(id);
    if (!found) return;
    if (confirm(`آیا از حذف «${found.product.name}» مطمئن هستید؟`)) {
      Products.deleteProduct(id);
      refreshProductsTable();
    }
  }

  function renderUsersTab() {
    const users = Auth.getUsers();
    if (users.length === 0)
      return `<p style="color:var(--text-muted);font-size:14px;padding:32px 0">هیچ کاربری ثبت‌نام نکرده است.</p>`;
    const rows = users.map(u => `
      <tr>
        <td style="font-weight:600;color:var(--text)">${u.firstname} ${u.lastname}</td>
        <td dir="ltr" style="text-align:right">${u.email}</td>
        <td>${u.phone || '—'}</td>
        <td dir="ltr" style="text-align:right;font-size:12px">${new Date(u.createdAt).toLocaleDateString('fa-IR')}</td>
        <td>
          <div class="action-btns">
            <button class="btn-action btn-edit" onclick="openEdit(${u.id})">ویرایش</button>
            <button class="btn-action btn-orders" onclick="openOrders(${u.id})">سفارش‌ها</button>
            <button class="btn-action btn-delete" onclick="confirmDelete(${u.id})">حذف</button>
          </div>
        </td>
      </tr>`).join('');
    return `
      <div class="section-header"><h2>کاربران ثبت‌نام‌شده (${users.length})</h2></div>
      <div class="data-table-wrap">
        <table class="data-table">
          <thead><tr><th>نام</th><th>ایمیل</th><th>موبایل</th><th>تاریخ ثبت</th><th>عملیات</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  function toggleAvail(id, available) {
    Products.setAvailability(id, available);
    const row = event.target.closest('tr');
    const label = row.querySelector('.avail-label');
    label.textContent = available ? 'موجود' : 'ناموجود';
    label.className = 'avail-label ' + (available ? 'yes' : 'no');
  }

  function openEdit(id) {
    const u = Auth.getUsers().find(u => u.id === id);
    if (!u) return;
    document.getElementById('edit-uid').value    = u.id;
    document.getElementById('edit-fn').value     = u.firstname  || '';
    document.getElementById('edit-ln').value     = u.lastname   || '';
    document.getElementById('edit-email').value  = u.email      || '';
    document.getElementById('edit-phone').value  = u.phone      || '';
    document.getElementById('edit-ostan').value  = u.ostan      || '';
    document.getElementById('edit-shahr').value  = u.shahr      || '';
    document.getElementById('edit-address').value= u.address    || '';
    document.getElementById('edit-postal').value = u.postal     || '';
    document.getElementById('edit-modal').classList.remove('hidden');
  }

  function saveEdit() {
    const id = Number(document.getElementById('edit-uid').value);
    Auth.updateUser(id, {
      firstname: document.getElementById('edit-fn').value.trim(),
      lastname:  document.getElementById('edit-ln').value.trim(),
      email:     document.getElementById('edit-email').value.trim(),
      phone:     document.getElementById('edit-phone').value.trim(),
      ostan:     document.getElementById('edit-ostan').value.trim(),
      shahr:     document.getElementById('edit-shahr').value.trim(),
      address:   document.getElementById('edit-address').value.trim(),
      postal:    document.getElementById('edit-postal').value.trim(),
    });
    closeModal('edit-modal');
    renderAdmin();
  }

  function openOrders(id) {
    const u = Auth.getUsers().find(u => u.id === id);
    if (!u) return;
    document.getElementById('orders-modal-title').textContent = `سفارش‌های ${u.firstname} ${u.lastname}`;
    const orders = u.orders || [];
    document.getElementById('orders-modal-body').innerHTML = orders.length === 0
      ? `<p class="no-orders">سفارشی ثبت نشده است.</p>`
      : orders.map(o => {
          const total = o.items.reduce((s, i) => s + resolveItemPrice(i) * i.qty, 0);
          return `
          <div class="order-item">
            <div class="order-meta">
              <span>${new Date(o.date).toLocaleDateString('fa-IR', { year:'numeric', month:'long', day:'numeric' })}</span>
              <span class="order-status">${o.status}</span>
            </div>
            <div class="order-products">${o.items.map(i => `${i.name} (×${i.qty}) — ${formatPrice(resolveItemPrice(i) * i.qty)}`).join(' ، ')}</div>
            <div class="order-products" style="margin-top:6px;font-weight:600;color:var(--gold-dark)">جمع: ${formatPrice(total)}</div>
          </div>`;
        }).join('');
    document.getElementById('orders-modal').classList.remove('hidden');
  }

  function confirmDelete(id) {
    const u = Auth.getUsers().find(u => u.id === id);
    if (!u) return;
    if (confirm(`آیا از حذف حساب ${u.firstname} ${u.lastname} مطمئن هستید؟`)) {
      Auth.deleteUser(id);
      renderAdmin();
    }
  }

  function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

  document.addEventListener('click', e => {
    if (e.target.classList.contains('modal-overlay')) closeModal(e.target.id);
  });

  (function initAdminPanel() {
    const body = document.getElementById('admin-body');
    if (!body) return;
    if (!Auth.isAdmin()) {
      body.innerHTML = `
        <div style="text-align:center;padding:80px 20px">
          <p style="font-size:15px;color:var(--text-muted)">دسترسی فقط برای مدیر مجاز است.</p>
          <a href="login.html" style="display:inline-block;margin-top:16px;padding:10px 24px;background:var(--green);color:#fff;border-radius:2px;font-size:13px;font-weight:700">ورود</a>
        </div>`;
      return;
    }
    renderAdmin();
  })();
  </script>
</body>
</html>
