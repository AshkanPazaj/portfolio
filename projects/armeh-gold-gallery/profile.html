<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>پروفایل | گالری طلای آرمه</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    a { text-decoration: none; color: inherit; }
    ul, ol { list-style: none; }
    button { font-family: inherit; }

    :root {
      --green:       #114411;
      --green-deep:  #0c330c;
      --green-mid:   #1a5c1a;
      --green-pale:  #e8f0e8;
      --green-tint:  #f2f6f2;
      --gold:        #c9a840;
      --gold-dark:   #9a7e28;
      --white:       #ffffff;
      --off-white:   #faf9f6;
      --cream:       #f4f0e6;
      --text:        #1a1a1a;
      --text-dim:    #6b6b6b;
      --text-muted:  #9a9a9a;
      --border:      #e0ddd5;
      --error:       #c0392b;
      --ease:        cubic-bezier(.25,.46,.45,.94);
    }
    html { scroll-behavior: smooth; }
    body { background: var(--off-white); color: var(--text); font-family: 'Vazirmatn', system-ui, sans-serif; line-height: 1.7; min-height: 100vh; }
    .container { width: 100%; max-width: 860px; margin: 0 auto; padding: 0 40px; }

    /* NAV */
    .nav {
      position: sticky; top: 0; z-index: 900; padding: 0 48px; height: 76px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(224, 221, 213, 0.45);
      transition: background .3s var(--ease), box-shadow .3s var(--ease), border-color .3s var(--ease);
    }
    .nav.scrolled {
      background: rgba(255, 255, 255, 0.82);
      border-bottom-color: var(--border);
      box-shadow: 0 2px 20px rgba(0,0,0,.06);
    }
    .nav-logo { display: flex; align-items: center; gap: 12px; }
    .nav-logo-img { height: 44px; width: auto; }
    .nav-links { display: flex; align-items: center; gap: 40px; }
    .nav-links a { font-size: 13px; font-weight: 500; color: var(--text-dim); transition: color .2s; }
    .nav-links a:hover { color: var(--green); }

    /* PAGE */
    .page-hero { background: var(--green); padding: 48px 0 40px; text-align: center; }
    .page-hero h1 { font-size: clamp(1.5rem, 3vw, 2.2rem); font-weight: 300; color: var(--white); }
    .page-hero h1 strong { font-weight: 700; color: var(--gold); }
    .page-hero p { font-size: 13px; color: rgba(255,255,255,.5); margin-top: 6px; }

    .page-body { padding: 48px 0 80px; }

    /* TABS */
    .tab-nav { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 32px; }
    .tab-btn { padding: 12px 24px; font-size: 13px; font-weight: 600; color: var(--text-muted); background: none; border: none; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: color .2s, border-color .2s; }
    .tab-btn.active { color: var(--green); border-color: var(--green); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* CARD */
    .card { background: var(--white); border: 1px solid var(--border); border-radius: 3px; padding: 28px 32px; }
    .card-title { font-size: 14px; font-weight: 700; color: var(--green-deep); margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }

    /* FORM */
    .form-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 5px; }
    .req { color: var(--error); margin-right: 2px; }
    .opt { font-weight: 400; color: var(--text-muted); font-size: 11px; margin-right: 4px; }
    .input-wrap { position: relative; }
    .input-wrap input { width: 100%; padding: 10px 38px 10px 12px; border: 1px solid var(--border); border-radius: 2px; font-family: 'Vazirmatn', sans-serif; font-size: 13px; color: var(--text); background: var(--white); outline: none; transition: border-color .2s; }
    .input-wrap input:focus { border-color: var(--green); }
    .input-wrap svg { position: absolute; top: 50%; right: 12px; transform: translateY(-50%); width: 16px; height: 16px; color: var(--text-muted); pointer-events: none; }
    .field-error { display: none; font-size: 11px; color: var(--error); margin-top: 4px; }
    .form-group.has-error .input-wrap input { border-color: var(--error); }
    .form-group.has-error .field-error { display: block; }
    .form-divider { height: 1px; background: var(--border); margin: 20px 0; }
    .btn-save { padding: 11px 32px; background: var(--green); color: var(--white); border: none; border-radius: 2px; font-family: 'Vazirmatn', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: background .2s; }
    .btn-save:hover { background: var(--green-mid); }
    .save-msg { font-size: 12px; color: var(--green); margin-right: 12px; opacity: 0; transition: opacity .3s; }
    .save-msg.show { opacity: 1; }

    /* ORDERS */
    .order-card { background: var(--off-white); border: 1px solid var(--border); border-radius: 3px; padding: 16px 20px; margin-bottom: 12px; }
    .order-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .order-date { font-size: 12px; color: var(--text-muted); }
    .order-status { font-size: 11px; font-weight: 700; padding: 2px 10px; border-radius: 10px; background: var(--cream); color: var(--gold-dark); }
    .order-items-list { font-size: 13px; color: var(--text-dim); }
    .no-orders { text-align: center; padding: 40px 0; color: var(--text-muted); font-size: 14px; }

    /* DELETE */
    .danger-zone { border: 1px solid rgba(192,57,43,.25); border-radius: 3px; padding: 24px 28px; }
    .danger-zone h3 { font-size: 14px; font-weight: 700; color: var(--error); margin-bottom: 8px; }
    .danger-zone p { font-size: 13px; color: var(--text-dim); margin-bottom: 16px; }
    .btn-danger { padding: 10px 24px; background: none; border: 1px solid rgba(192,57,43,.4); color: var(--error); border-radius: 2px; font-family: 'Vazirmatn', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: background .2s; }
    .btn-danger:hover { background: rgba(192,57,43,.06); }

    @media (max-width: 768px) {
      .container { padding: 0 20px; }
      .nav { padding: 0 20px; }
      .page-hero { padding: 40px 0 32px; }
      .page-body { padding: 32px 0 48px; }
      .form-row2 { grid-template-columns: 1fr; }
      .card { padding: 20px; }
    }
    @media (max-width: 480px) {
      .container { padding: 0 16px; }
      .nav { padding: 0 16px; }
      .card { padding: 16px; }
    }
  </style>
</head>
<body>

  <nav class="nav" id="nav" aria-label="ناوبری اصلی">
    <ul class="nav-links" id="nav-links">
      <li><a href="index.html#collections">مجموعه‌ها</a></li>
      <li><a href="index.html#about">درباره ما</a></li>
      <li id="nav-login-li"><a href="login.html">ورود</a></li>
      <li id="nav-admin-li" style="display:none"><a href="admin.html" class="nav-admin-link">پنل مدیریت</a></li>
      <li id="nav-logout-li" style="display:none">
        <a href="profile.html" class="nav-user-name" id="nav-profile-link"></a>
        <button class="nav-logout-btn" onclick="Auth.logout()">خروج</button>
      </li>
    </ul>
    <div class="nav-end">
      <a href="index.html" class="nav-logo" aria-label="گالری طلای آرمه">
        <img src="assets/logo-transparent.png" alt="آرمه گلد" class="nav-logo-img" />
      </a>
      <a href="cart.html" class="nav-cart" aria-label="سبد خرید">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <span class="cart-badge" style="display:none"></span>
      </a>
    </div>
  </nav>

  <section class="page-hero">
    <div class="container">
      <h1><strong>پروفایل</strong> من</h1>
      <p id="hero-name">حساب کاربری شما</p>
    </div>
  </section>

  <main class="page-body">
    <div class="container" id="profile-body">
      <!-- rendered by JS -->
    </div>
  </main>

  <script src="js/armeh.js"></script>
  <script>
  (function() {
    if (!Auth.isUser()) {
      document.getElementById('profile-body').innerHTML = `
        <div style="text-align:center;padding:80px 20px">
          <p style="font-size:15px;color:var(--text-muted)">برای مشاهده پروفایل ابتدا وارد شوید.</p>
          <a href="login.html" style="display:inline-block;margin-top:16px;padding:10px 24px;background:var(--green);color:#fff;border-radius:2px;font-size:13px;font-weight:700">ورود</a>
        </div>`;
      return;
    }
    renderProfile();
  })();

  function renderProfile() {
    const sess = Auth.getSession();
    const u    = Auth.getUsers().find(u => u.id === sess.id) || {};
    document.getElementById('hero-name').textContent = u.firstname + ' ' + u.lastname;

    document.getElementById('profile-body').innerHTML = `
      <div class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('info', this)">اطلاعات شخصی</button>
        <button class="tab-btn" onclick="switchTab('orders', this)">تاریخچه سفارش‌ها</button>
        <button class="tab-btn" onclick="switchTab('security', this)">امنیت</button>
        <button class="tab-btn" onclick="switchTab('delete', this)">حذف حساب</button>
      </div>

      <!-- INFO TAB -->
      <div class="tab-panel active" id="tab-info">
        <div class="card">
          <div class="card-title">اطلاعات شخصی</div>
          <div class="form-row2">
            <div class="form-group"><label>نام <span class="req">*</span></label>
              <div class="input-wrap"><input id="p-fn" type="text" value="${esc(u.firstname)}" />
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              </div></div>
            <div class="form-group"><label>نام خانوادگی <span class="req">*</span></label>
              <div class="input-wrap"><input id="p-ln" type="text" value="${esc(u.lastname)}" />
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              </div></div>
          </div>
          <div class="form-group"><label>ایمیل <span class="req">*</span></label>
            <div class="input-wrap"><input id="p-email" type="email" value="${esc(u.email)}" dir="ltr" style="text-align:right" />
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </div></div>
          <div class="form-group"><label>شماره موبایل <span class="opt">(اختیاری)</span></label>
            <div class="input-wrap"><input id="p-phone" type="tel" value="${esc(u.phone||'')}" dir="ltr" style="text-align:right" />
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 014.15 12a19.79 19.79 0 01-3.07-8.67A2 2 0 013.07 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L7.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0121 16l.92.92z"/></svg>
            </div></div>
          <div class="form-divider"></div>
          <div class="form-row2">
            <div class="form-group"><label>استان</label>
              <div class="input-wrap"><input id="p-ostan" type="text" value="${esc(u.ostan||'')}" />
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
              </div></div>
            <div class="form-group"><label>شهر</label>
              <div class="input-wrap"><input id="p-shahr" type="text" value="${esc(u.shahr||'')}" />
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
              </div></div>
          </div>
          <div class="form-group"><label>آدرس</label>
            <div class="input-wrap"><input id="p-address" type="text" value="${esc(u.address||'')}" />
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            </div></div>
          <div class="form-group"><label>کد پستی</label>
            <div class="input-wrap"><input id="p-postal" type="text" value="${esc(u.postal||'')}" dir="ltr" style="text-align:right" maxlength="10" />
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></svg>
            </div></div>
          <div style="display:flex;align-items:center;margin-top:8px">
            <button class="btn-save" onclick="saveInfo()">ذخیره تغییرات</button>
            <span class="save-msg" id="info-msg">ذخیره شد ✓</span>
          </div>
        </div>
      </div>

      <!-- ORDERS TAB -->
      <div class="tab-panel" id="tab-orders">
        <div class="card">
          <div class="card-title">تاریخچه سفارش‌ها</div>
          <div id="orders-list">${renderOrders(u.orders)}</div>
        </div>
      </div>

      <!-- SECURITY TAB -->
      <div class="tab-panel" id="tab-security">
        <div class="card">
          <div class="card-title">تغییر رمز عبور</div>
          <div class="form-group"><label>رمز عبور فعلی <span class="req">*</span></label>
            <div class="input-wrap"><input id="p-cur-pw" type="password" autocomplete="current-password" />
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            </div><p class="field-error" id="pw-err">رمز عبور فعلی اشتباه است.</p></div>
          <div class="form-group"><label>رمز عبور جدید <span class="req">*</span></label>
            <div class="input-wrap"><input id="p-new-pw" type="password" autocomplete="new-password" />
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            </div></div>
          <div class="form-group"><label>تکرار رمز عبور جدید <span class="req">*</span></label>
            <div class="input-wrap"><input id="p-con-pw" type="password" autocomplete="new-password" />
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            </div><p class="field-error" id="pw-match-err">رمزهای عبور یکسان نیستند.</p></div>
          <div style="display:flex;align-items:center;gap:12px">
            <button class="btn-save" onclick="changePassword()">تغییر رمز</button>
            <span class="save-msg" id="pw-msg">رمز عبور تغییر کرد ✓</span>
          </div>
        </div>
      </div>

      <!-- DELETE TAB -->
      <div class="tab-panel" id="tab-delete">
        <div class="danger-zone">
          <h3>حذف حساب کاربری</h3>
          <p>با حذف حساب، تمام اطلاعات و سابقه سفارش‌های شما به صورت دائم پاک می‌شود و قابل بازیابی نیست.</p>
          <button class="btn-danger" onclick="requestDelete()">حذف حساب من</button>
        </div>
      </div>`;
  }

  function renderOrders(orders) {
    if (!orders || orders.length === 0)
      return `<p class="no-orders">هیچ سفارشی ثبت نشده است.</p>`;
    return orders.map(o => {
      const total = o.items.reduce((s, i) => s + resolveItemPrice(i) * i.qty, 0);
      return `
      <div class="order-card">
        <div class="order-header">
          <span class="order-date">${new Date(o.date).toLocaleDateString('fa-IR', { year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' })}</span>
          <span class="order-status">${o.status}</span>
        </div>
        <div class="order-items-list">${o.items.map(i => `${i.name} ×${i.qty} — ${formatPrice(resolveItemPrice(i) * i.qty)}`).join(' · ')}</div>
        <div class="order-items-list" style="margin-top:8px;font-weight:600;color:var(--gold-dark)">جمع: ${formatPrice(total)}</div>
      </div>`;
    }).join('');
  }

  function switchTab(name, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
  }

  function saveInfo() {
    const sess = Auth.getSession();
    const fn = document.getElementById('p-fn').value.trim();
    const ln = document.getElementById('p-ln').value.trim();
    const em = document.getElementById('p-email').value.trim();
    if (!fn || !ln || !em) return;
    Auth.updateUser(sess.id, {
      firstname: fn, lastname: ln, email: em,
      phone:     document.getElementById('p-phone').value.trim(),
      ostan:     document.getElementById('p-ostan').value.trim(),
      shahr:     document.getElementById('p-shahr').value.trim(),
      address:   document.getElementById('p-address').value.trim(),
      postal:    document.getElementById('p-postal').value.trim(),
    });
    const msg = document.getElementById('info-msg');
    msg.classList.add('show'); setTimeout(() => msg.classList.remove('show'), 2500);
    document.getElementById('hero-name').textContent = fn + ' ' + ln;
  }

  function changePassword() {
    const sess  = Auth.getSession();
    const u     = Auth.getUsers().find(u => u.id === sess.id);
    const cur   = document.getElementById('p-cur-pw').value;
    const nw    = document.getElementById('p-new-pw').value;
    const con   = document.getElementById('p-con-pw').value;
    const errEl = document.getElementById('pw-err');
    const matEl = document.getElementById('pw-match-err');
    errEl.style.display = 'none'; matEl.style.display = 'none';
    if (u.password !== cur) { errEl.style.display = 'block'; return; }
    if (!nw || nw !== con)  { matEl.style.display = 'block'; return; }
    Auth.updateUser(sess.id, { password: nw });
    document.getElementById('p-cur-pw').value = '';
    document.getElementById('p-new-pw').value = '';
    document.getElementById('p-con-pw').value = '';
    const msg = document.getElementById('pw-msg');
    msg.classList.add('show'); setTimeout(() => msg.classList.remove('show'), 2500);
  }

  function requestDelete() {
    if (!confirm('آیا مطمئن هستید که می‌خواهید حساب کاربری خود را حذف کنید؟ این عملیات غیرقابل بازگشت است.')) return;
    const sess = Auth.getSession();
    Auth.deleteUser(sess.id);
    window.location.href = 'index.html';
  }

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  </script>
</body>
</html>
