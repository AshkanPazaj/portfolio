<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Eva Beauty Clinic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90' text-anchor='middle' x='50'%3E%E2%9C%BF%3C/text%3E%3C/svg%3E" />
</head>
<body class="auth-page">
    <!-- Navigation -->
    <header class="navbar" id="navbar">
        <div class="container nav-inner">
            <a href="index.html" class="brand">
                <span class="brand-mark">E</span>
                <span class="brand-text">Eva<small>Beauty Clinic</small></span>
            </a>
            <nav class="nav-links" id="navLinks">
                <a href="index.html#services">Services</a>
                <a href="booking.html" class="btn btn-primary nav-cta">Book Now</a>
            </nav>
            <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <main class="auth-main">
        <div class="auth-card">
            <div class="auth-brand">
                <span class="brand-mark brand-mark-lg">E</span>
                <h1 class="auth-title">Welcome back</h1>
                <p class="auth-sub">Sign in to your Eva account</p>
            </div>

            <div class="auth-error" id="authError" hidden></div>

            <form id="loginForm" novalidate>
                <div class="form-row">
                    <label for="loginPhone">Phone Number</label>
                    <input type="tel" id="loginPhone" name="phone" placeholder="+1 (555) 000-0000" required autocomplete="tel" />
                </div>
                <div class="form-row">
                    <label for="loginPassword">Password</label>
                    <div class="input-wrap">
                        <input type="password" id="loginPassword" name="password" placeholder="Enter your password" required autocomplete="current-password" />
                        <button type="button" class="toggle-pw" aria-label="Show password" data-target="loginPassword">Show</button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Sign In</button>
            </form>

            <p class="auth-switch">
                Don't have an account? <a href="signup.html">Sign up</a>
            </p>
        </div>
    </main>

    <footer class="footer">
        <div class="container footer-inner">
            <div class="brand" style="justify-content:center;">
                <span class="brand-mark">E</span>
                <span class="brand-text">Eva<small>Beauty Clinic</small></span>
            </div>
            <p>&copy; <span id="year"></span> Eva Beauty Clinic. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
    (function () {
        const form = document.getElementById('loginForm');
        const errorBox = document.getElementById('authError');

        function showError(msg) {
            errorBox.textContent = msg;
            errorBox.hidden = false;
        }

        form.addEventListener('submit', function (e) {
            e.preventDefault();
            errorBox.hidden = true;
            const phone    = document.getElementById('loginPhone').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!phone || !password) { showError('Please fill in all fields.'); return; }
            let users = [];
            try { users = JSON.parse(localStorage.getItem('eva_users') || '[]'); } catch {}
            const user = users.find(function (u) { return u.phone === phone && u.password === password; });
            if (user) {
                localStorage.setItem('eva_current_user', JSON.stringify(user));
                const redirect = new URLSearchParams(location.search).get('redirect') || 'index.html';
                window.location.href = redirect;
            } else {
                showError('Phone number or password is incorrect. Please try again.');
            }
        });

        // Toggle password visibility
        document.querySelectorAll('.toggle-pw').forEach(function (btn) {
            btn.addEventListener('click', function () {
                const input = document.getElementById(btn.dataset.target);
                const show = input.type === 'password';
                input.type = show ? 'text' : 'password';
                btn.textContent = show ? 'Hide' : 'Show';
            });
        });
    })();
    </script>
</body>
</html>
